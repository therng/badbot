# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "badbot"

[setup]
script = ""

[setup.darwin]
script = '''
#!/usr/bin/env bash
set -e

echo "🐳 Setting up with Docker..."

# Build + start
docker compose up -d --build

echo "⏳ Waiting for database to be ready..."

# wait for db (สำคัญมาก)
until docker compose exec db pg_isready -U postgres > /dev/null 2>&1; do
  sleep 2
done

echo "🧬 Running Prisma generate..."
docker compose exec web npx prisma generate

echo "🗄️ Syncing schema (dev only)..."
docker compose exec web npx prisma db push || true

echo "✅ Setup complete"
'''

[cleanup]
script = ""

[cleanup.darwin]
script = '''
#!/usr/bin/env bash
set -e

echo "🧹 Cleaning environment..."

docker compose down --remove-orphans || true

rm -rf .next dist node_modules/.cache
rm -rf node_modules/.prisma || true

echo "✅ Cleanup complete"
'''

[[actions]]
name = "Start Dev"
icon = "tool"
command = "docker compose up -d"
platform = "darwin"

[[actions]]
name = "Stop Dev"
icon = "tool"
command = "docker compose down"
platform = "darwin"

[[actions]]
name = "Rebuild"
icon = "tool"
command = "docker compose up -d --build"
platform = "darwin"

[[actions]]
name = "Logs"
icon = "tool"
command = '''
docker compose logs -f web
docker compose logs -f worker
'''
platform = "darwin"

[[actions]]
name = "Prisma Generate"
icon = "tool"
command = "docker compose exec web npx prisma generate"
platform = "darwin"

[[actions]]
name = "Sync DB"
icon = "tool"
command = "docker compose exec web npx prisma db push"
platform = "darwin"

[[actions]]
name = "Clean"
icon = "tool"
command = '''
docker compose down --remove-orphans
rm -rf .next dist node_modules/.cache
'''

[[actions]]
name = "Clean + Reset DB (อันตราย)"
icon = "tool"
command = '''
docker compose down --remove-orphans

psql $DATABASE_URL <<EOF
TRUNCATE TABLE 
  "deal_ledger",
  "open_position_snapshots",
  "working_order_snapshots",
  "account_summary_snapshots",
  "report_result_snapshots",
  "account_reports",
  "accounts"
RESTART IDENTITY CASCADE;
EOF
'''
platform = "darwin"
