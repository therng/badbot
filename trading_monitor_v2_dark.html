<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Monitor — BadBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090d;
  --border:#1e2a3a;
  --text:#e7ecf4;
  --muted:#7c8797;
  --muted-2:#5b6574;
  --accent:#67d6ff;
  --accent-2:#35f2a6;
  --danger:#ff6b6b;
  --warn:#f7b955;
  --radius:18px;
}
body{
  background:
    radial-gradient(1200px 520px at 50% -10%, rgba(51,124,255,0.12), transparent 60%),
    radial-gradient(800px 320px at 85% 12%, rgba(53,242,166,0.12), transparent 55%),
    var(--bg);
  display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 16px;
  font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  color:var(--text);
}
.app{
  max-width:420px;width:100%;
  background:
    linear-gradient(180deg,#0c1118 0%,#0a0e15 100%),
    repeating-linear-gradient(180deg,rgba(255,255,255,0.025) 0px,rgba(255,255,255,0.025) 1px,rgba(255,255,255,0) 1px,rgba(255,255,255,0) 3px);
  border-radius:22px;height:760px;display:flex;flex-direction:column;overflow:hidden;
  color:var(--text);border:1px solid #111825;box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.scroll{flex:1;overflow-y:auto;padding:14px 14px 8px;}
.scroll::-webkit-scrollbar{display:none;}
.bnav{flex-shrink:0;background:#0f141c;border-top:1px solid var(--border);display:flex;padding:8px 0 18px;}
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted-2);
  font-size:9px;cursor:pointer;padding:4px 0;font-family:'JetBrains Mono',ui-monospace,monospace;text-transform:uppercase;letter-spacing:0.6px;
}
.bni.on{color:var(--accent);}
.bni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;}
.card{
  background:linear-gradient(180deg,rgba(17,24,36,0.98) 0%,rgba(12,17,26,0.98) 100%);
  border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);
  box-shadow:0 16px 40px rgba(0,0,0,0.35);
}
.acc-card{padding:16px 16px 14px;}
.acc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.acc-name{font-size:16px;font-weight:600;letter-spacing:0.2px;}
.acc-id{font-size:11px;color:var(--muted);margin-top:1px;}
.acc-perf{font-size:14px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;}
.acc-perf .chip{font-size:10px;letter-spacing:0.3px;color:var(--muted);border:1px solid var(--border);padding:3px 6px;border-radius:999px;}
.acc-meta{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:10px;color:var(--muted);}
.broker-tag{
  font-size:10px;color:var(--accent);
  background:rgba(103,214,255,0.08);border:1px solid rgba(103,214,255,0.45);
  padding:2px 6px;border-radius:999px;letter-spacing:0.3px;
}
.spark-wrap{position:relative;margin:10px 0 8px;background:linear-gradient(180deg,rgba(9,13,20,0.8),rgba(8,12,18,0.6));border:1px solid #152033;border-radius:14px;padding:8px 10px 10px;}
.spark-wrap:before{
  content:"";position:absolute;inset:8px 10px 10px;border-radius:10px;
  background-image:
    linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px),
    linear-gradient(180deg,rgba(255,255,255,0.04) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none;
}
.spark-axis{position:absolute;left:12px;top:6px;font-size:10px;color:var(--muted-2);}
.spark-canvas{position:relative;height:70px;}
.last-pos{
  position:absolute;right:10px;bottom:8px;font-size:10px;color:var(--muted);
  background:rgba(12,18,26,0.72);border:1px solid #1a2636;border-radius:999px;padding:4px 8px;
  display:flex;align-items:center;gap:6px;backdrop-filter:blur(6px);
}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.35;transform:scale(0.6);}}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--accent-2);display:inline-block;flex-shrink:0;box-shadow:0 0 10px rgba(53,242,166,0.45);}
.sdot.live{animation:breathe 2.2s ease-in-out infinite;}
.tb{
  background:rgba(15,22,32,0.8);border:1px solid var(--border);border-radius:8px;padding:4px 10px;
  font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;letter-spacing:0.2px;
}
.tb.on{background:rgba(103,214,255,0.12);color:var(--accent);border-color:rgba(103,214,255,0.5);box-shadow:0 0 0 1px rgba(103,214,255,0.2) inset;}
.kgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;}
.kchip{
  background:rgba(12,18,26,0.8);border-radius:10px;padding:8px 6px;cursor:pointer;border:1px solid #162234;
  transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;
}
.kchip:hover{border-color:rgba(103,214,255,0.6);box-shadow:0 0 0 1px rgba(103,214,255,0.2) inset;transform:translateY(-1px);}
.kl{font-size:9px;color:var(--muted);letter-spacing:0.4px;margin-bottom:3px;text-transform:uppercase;}
.kv{font-size:12px;font-weight:500;font-family:'JetBrains Mono',ui-monospace,monospace;}
.pos{color:var(--accent-2);} .neg{color:var(--danger);} .warn{color:var(--warn);} .blue{color:var(--accent);}
.slbl{font-size:10px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin:0 0 8px;}
.mrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.mrow:last-child{border-bottom:none;}
.ml{font-size:13px;color:var(--muted);}
.mv{font-size:13px;font-weight:500;font-family:'JetBrains Mono',ui-monospace,monospace;color:var(--text);}
.back{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;padding:0 0 12px;font-family:inherit;}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;}
.tag-buy{background:rgba(59,130,246,0.18);color:#60A5FA;}
.tag-sell{background:rgba(239,68,68,0.16);color:#F87171;}
.bar-track{background:#1b2432;border-radius:4px;height:5px;overflow:hidden;margin:3px 0 8px;}
.bar-fill{height:100%;border-radius:4px;}
.risk-bar{height:8px;border-radius:4px;background:linear-gradient(to right,#35f2a6 0%,#f7b955 50%,#ff6b6b 100%);position:relative;margin:4px 0 4px;}
.risk-dot{width:10px;height:10px;border-radius:50%;background:var(--text);border:2px solid #0f141c;position:absolute;top:-1px;transform:translateX(-50%);}
.trow{border-bottom:1px solid var(--border);padding:10px 0;cursor:pointer;}
.trow:last-child{border-bottom:none;}
.ytd-wrap{overflow-x:auto;margin-top:8px;}
.ytd-wrap::-webkit-scrollbar{height:3px;}
.ytd-wrap::-webkit-scrollbar-thumb{background:#4B5563;border-radius:2px;}
.ytd{border-collapse:collapse;font-size:11px;min-width:640px;}
.ytd th{color:var(--muted);padding:4px 7px;text-align:center;font-weight:400;white-space:nowrap;}
.ytd td{padding:5px 7px;text-align:center;white-space:nowrap;font-family:ui-monospace,monospace;}
.ytd .yr-col{position:sticky;right:0;background:#0f141c;font-weight:500;}
.ytd .row-lbl{text-align:left;color:var(--muted);font-family:inherit;}
.ytd .th-yr{position:sticky;right:0;background:#0f141c;}
.tf-row{display:flex;justify-content:flex-end;gap:4px;margin-top:6px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scroll" id="main-scroll"></div>
  <div class="bnav">
    <button class="bni on" onclick="nav('dashboard')" id="bni-dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      Dashboard
    </button>
    <button class="bni" onclick="nav('positions')" id="bni-positions">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>
      Positions
    </button>
    <button class="bni" onclick="nav('history')" id="bni-history">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h7"/></svg>
      History
    </button>
    <button class="bni" onclick="nav('accounts')" id="bni-accounts">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Accounts
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ACCS=[
  {id:'7953093',name:'Supachai',broker:'IC Markets',currency:'USD',mode:'Hedge',status:'active',
   sp:[9200,9850,10100,9600,10800,11200,10900,11800,12100,12850],
   data:{D:{p:245.5,dd:2.1,w:68.5,t:14,e:12850,bal:12605,gross:314,comm:42,swap:12,loss:69,g:1.9},
         W:{p:1120.8,dd:3.8,w:65.2,t:67,e:12850,bal:12450,gross:1480,comm:208,swap:58,loss:360,g:8.4},
         M:{p:3240.6,dd:5.4,w:62.8,t:218,e:12850,bal:12200,gross:4180,comm:642,swap:192,loss:940,g:24.2},
         Y:{p:18540.2,dd:8.2,w:61.4,t:1847,e:12850,bal:10800,gross:23500,comm:3200,swap:890,loss:5000,g:138.7},
         A:{p:28540.2,dd:12.5,w:60.8,t:3241,e:12850,bal:8400,gross:36000,comm:5100,swap:1400,loss:8000,g:213.4}},
   ytd:{'2025':{Jan:null,Feb:null,Mar:1068,Apr:418,May:767,Jun:586,Jul:945,Aug:1200,Sep:2140,Oct:3100,Nov:2890,Dec:4469,year:16583.76},
        '2026':{Jan:4976,Feb:-620,Mar:-1967,Apr:null,May:null,Jun:null,Jul:null,Aug:null,Sep:null,Oct:null,Nov:null,Dec:null,year:2388.67}}},
  {id:'7934251',name:'Bot-Pepper',broker:'Pepperstone',currency:'USD',mode:'Netting',status:'active',
   sp:[3800,4200,4100,4500,4200,4800,4600,5100,5000,5420],
   data:{D:{p:-85.2,dd:4.2,w:42.1,t:8,e:5421,bal:5506,gross:120,comm:18,swap:5,loss:205,g:-1.5},
         W:{p:320.4,dd:6.1,w:55.3,t:39,e:5421,bal:5200,gross:620,comm:120,swap:32,loss:300,g:5.9},
         M:{p:-180.2,dd:9.8,w:48.7,t:124,e:5421,bal:5600,gross:1800,comm:380,swap:95,loss:1980,g:-3.2},
         Y:{p:2840.6,dd:14.6,w:52.1,t:987,e:5421,bal:3800,gross:8200,comm:1600,swap:420,loss:5360,g:42.8},
         A:{p:4420.8,dd:18.3,w:51.4,t:1842,e:5421,bal:2000,gross:12000,comm:2400,swap:680,loss:7580,g:65.4}},
   ytd:{'2025':{Jan:null,Feb:null,Mar:null,Apr:null,May:null,Jun:null,Jul:1200,Aug:-340,Sep:980,Oct:2100,Nov:1800,Dec:3200,year:8940},
        '2026':{Jan:1200,Feb:-180,Mar:-180,Apr:null,May:null,Jun:null,Jul:null,Aug:null,Sep:null,Oct:null,Nov:null,Dec:null,year:840}}}
];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TFL=['D','W','M','Y','A'];
const ST={screen:'dashboard',tf:{},ytd:{},expandedTrade:null,detAcc:null,detType:null};
ACCS.forEach(a=>{ST.tf[a.id]='M';ST.ytd[a.id]=false;});
const CH={};

function dC(id){if(CH[id]){try{CH[id].destroy();}catch(e){}delete CH[id];}}
function fP(v){return(v>=0?'+$':'-$')+Math.abs(v).toLocaleString('en',{maximumFractionDigits:0});}
function cP(v){return v>=0?'pos':'neg';}
function cD(v){return v<=5?'pos':v<=15?'warn':'neg';}
function pct(a,b){return b?Math.min(100,Math.round(a/b*100)):0;}

function nav(screen,acc,type){
  ST.screen=screen;ST.detAcc=acc||null;ST.detType=type||null;
  Object.keys(CH).forEach(k=>dC(k));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  const map={dashboard:'dashboard',positions:'positions',history:'history',accounts:'accounts',detail:'dashboard'};
  const btn=document.getElementById('bni-'+(map[screen]||'dashboard'));
  if(btn)btn.classList.add('on');
  render();
}

function render(){
  const el=document.getElementById('main-scroll');
  el.scrollTop=0;
  const s=ST.screen;
  if(s==='dashboard')el.innerHTML=rDash();
  else if(s==='detail')el.innerHTML=rDetail();
  else if(s==='positions')el.innerHTML=rPos();
  else if(s==='history')el.innerHTML=rHist();
  else if(s==='accounts')el.innerHTML=rAccs();
  setTimeout(initCharts,90);
}

function rDash(){
  return`<div style="padding-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;">
      <div>
        <h2 style="font-size:18px;font-weight:600;color:var(--text);letter-spacing:0.2px;">Trading monitor</h2>
        <p style="font-size:11px;color:var(--muted);margin-top:2px;">MT5 · Last sync 2 min ago</p>
      </div>
      <span style="font-size:10px;background:rgba(53,242,166,0.12);color:var(--accent-2);padding:3px 8px;border-radius:6px;font-weight:600;">● live</span>
    </div>
    ${ACCS.map(rCard).join('')}
  </div>`;
}

function rCard(a){
  const d=a.data[ST.tf[a.id]];
  const ytdOpen=ST.ytd[a.id];
  const gColor=d.g>=0?'var(--accent-2)':'var(--danger)';
  const gText=(d.g>=0?'+':'')+d.g.toFixed(1)+'%';
  const axisVal=Math.round(d.e/1000)*1000;
  return`<div class="card acc-card">
    <div class="acc-head">
      <div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="sdot ${a.status==='active'?'live':''}"></span>
          <span class="acc-name">${a.name}</span>
        </div>
        <div class="acc-id">#${a.id}</div>
        <div class="acc-meta">
          <span class="broker-tag">${a.broker}</span>
          <span>·</span>
          <span>${a.mode}</span>
          <span>·</span>
          <span>$${d.bal.toLocaleString()} bal</span>
        </div>
      </div>
      <div class="acc-perf" style="color:${gColor};">
        ${gText}
        <span class="chip">${ST.tf[a.id]}</span>
      </div>
    </div>
    <div class="spark-wrap">
      <div class="spark-axis">$${axisVal.toLocaleString()}</div>
      <div class="spark-canvas"><canvas id="sp-${a.id}"></canvas></div>
      <div class="last-pos"><span class="sdot ${a.status==='active'?'live':''}"></span> last position</div>
    </div>
    <div class="tf-row">${TFL.map(t=>`<button class="tb${ST.tf[a.id]===t?' on':''}" onclick="ST.tf['${a.id}']='${t}';render();">${t}</button>`).join('')}</div>
    ${ytdOpen?`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:6px;margin-bottom:10px;">${rYtd(a)}</div>`:''}
    <div style="border-top:1px solid var(--border);padding-top:10px;">
      <div class="kgrid">
        <div class="kchip" onclick="nav('detail','${a.id}','profit')"><div class="kl">Profit</div><div class="kv ${cP(d.p)}">${fP(d.p)}</div></div>
        <div class="kchip" onclick="nav('detail','${a.id}','risk')"><div class="kl">Drawdown</div><div class="kv ${cD(d.dd)}">${d.dd.toFixed(1)}%</div></div>
        <div class="kchip" onclick="nav('detail','${a.id}','win')"><div class="kl">Win %</div><div class="kv blue">${d.w.toFixed(1)}%</div></div>
        <div class="kchip" onclick="ST.ytd['${a.id}']=!ST.ytd['${a.id}'];render();"><div class="kl">Trades</div><div class="kv" style="color:#E5E7EB;">${d.t.toLocaleString()}</div></div>
      </div>
    </div>
  </div>`;
}

function rYtd(a){
  const years=Object.keys(a.ytd);
  const total=years.reduce((s,y)=>s+(a.ytd[y].year||0),0);
  return`<p style="font-size:10px;color:#6B7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;">Year-to-date growth</p>
  <div class="ytd-wrap"><table class="ytd">
    <thead><tr><th class="row-lbl" style="text-align:left;color:#6B7280;">Year</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th class="th-yr">Total</th></tr></thead>
    <tbody>${years.map(y=>{const r=a.ytd[y];return`<tr><td class="row-lbl">${y}</td>${MONTHS.map(m=>{const v=r[m];if(v===null||v===undefined)return`<td style="color:#374151;">–</td>`;return`<td class="${cP(v)}">${v>=0?'+':''}${Math.round(v).toLocaleString()}</td>`;}).join('')}<td class="yr-col ${cP(r.year)}">${r.year>=0?'+':''}${Math.round(r.year).toLocaleString()}</td></tr>`;}).join('')}</tbody>
    <tfoot><tr><td colspan="13" style="padding-top:6px;font-size:10px;color:#6B7280;text-align:right;font-family:inherit;">Grand total</td><td class="yr-col" style="padding-top:6px;font-weight:500;color:${total>=0?'#22C55E':'#EF4444'};">${total>=0?'+':''}${Math.round(total).toLocaleString()}</td></tr></tfoot>
  </table></div>`;
}

function rDetail(){
  const a=ACCS.find(x=>x.id===ST.detAcc);
  const t=ST.detType;
  const titles={profit:'Profit detail',risk:'Risk & drawdown',win:'Win statistics',equity:'Equity detail'};
  return`<div style="padding-bottom:16px;">
    <button class="back" onclick="nav('dashboard')">‹ Back</button>
    <div style="margin-bottom:12px;">
      <h2 style="font-size:16px;font-weight:500;color:#E5E7EB;">${titles[t]||t}</h2>
      <p style="font-size:11px;color:#6B7280;margin-top:2px;">${a.name} · #${a.id}</p>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:4px;margin-bottom:12px;">${TFL.map(tf=>`<button class="tb${ST.tf[a.id]===tf?' on':''}" onclick="ST.tf['${a.id}']='${tf}';render();">${tf}</button>`).join('')}</div>
    ${t==='profit'?rProfit(a):t==='risk'?rRisk(a):t==='win'?rWin(a):rEquity(a)}
  </div>`;
}

function rProfit(a){
  const d=a.data[ST.tf[a.id]];
  const syms=['XAUUSD','EURUSD','GBPUSD','USDJPY','AUDUSD'];
  const sp=[0.38,0.26,0.18,0.11,0.07].map(r=>Math.round(d.p*r));
  const mx=Math.max(...sp.map(Math.abs));
  const colors=['#38BDF8','#22C55E','#A78BFA','#F59E0B','#F87171'];
  return`<div class="card"><p class="slbl">Summary</p>
    ${[['Total profit','+$'+d.gross.toLocaleString(),'pos'],['Commission','-$'+d.comm,'neg'],['Swap','-$'+d.swap,'neg'],['Total loss','-$'+d.loss.toLocaleString(),'neg'],['Net profit',fP(d.p),cP(d.p)]].map(([l,v,c])=>`<div class="mrow"><span class="ml">${l}</span><span class="mv ${c}">${v}</span></div>`).join('')}
  </div>
  <div class="card"><p class="slbl">Symbol mix</p>
    <div style="height:150px;position:relative;"><canvas id="d-pie"></canvas></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">${syms.map((s,i)=>`<span style="font-size:10px;color:#9CA3AF;display:flex;align-items:center;gap:3px;"><span style="width:8px;height:8px;border-radius:2px;background:${colors[i]};display:inline-block;"></span>${s}</span>`).join('')}</div>
  </div>
  <div class="card"><p class="slbl">Profit by symbol</p>
    ${syms.map((s,i)=>`<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#E5E7EB;font-weight:500;">${s}</span><span class="${cP(sp[i])}" style="font-family:monospace;">${fP(sp[i])}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(Math.abs(sp[i]),mx)}%;background:${sp[i]>=0?'#22C55E':'#EF4444'};"></div></div></div>`).join('')}
  </div>`;
}

function rEquity(a){
  const d=a.data[ST.tf[a.id]];
  const peak=Math.round(d.e*1.054),minE=Math.round(d.e*0.912);
  return`<div class="card"><p class="slbl">Balance vs equity</p>
    <div style="height:170px;position:relative;margin-bottom:8px;"><canvas id="d-eq"></canvas></div>

      <span style="display:flex;align-items:center;gap:4px;"><span style="width:14px;border-top:2px dashed #6B7280;display:inline-block;"></span>Balance</span>
    </div>
  </div>

function rRisk(a){
  const d=a.data[ST.tf[a.id]];
  const ddPx=Math.min(d.dd/20*100,98);
  const depLoad=Math.min(95,Math.round(d.dd*5.8));
  const best=Math.round(d.gross*0.04),worst=Math.round(d.loss*0.038);
  return`<div class="card"><p class="slbl">Drawdown summary</p>
    ${[['Absolute drawdown','$'+Math.round(d.loss*0.12).toLocaleString(),''],['Relative drawdown',d.dd.toFixed(1)+'%',cD(d.dd)],['Maximal drawdown','$'+Math.round(d.loss*0.48).toLocaleString(),'warn']].map(([l,v,c])=>`<div class="mrow"><span class="ml">${l}</span><span class="mv ${c}">${v}</span></div>`).join('')}
  </div>
  <div class="card"><p class="slbl">Risk gauges</p>
    <div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#9CA3AF;">Max drawdown</span><span style="font-family:monospace;color:#E5E7EB;">${d.dd.toFixed(2)}%</span></div><div class="risk-bar"><div class="risk-dot" style="left:${ddPx}%;"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;color:#4B5563;margin-top:2px;"><span>0%</span><span>10%</span><span>20%</span></div></div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#9CA3AF;">Max deposit load</span><span style="font-family:monospace;color:#E5E7EB;">${depLoad}%</span></div><div class="risk-bar"><div class="risk-dot" style="left:${Math.min(depLoad,98)}%;"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;color:#4B5563;margin-top:2px;"><span>0%</span><span>50%</span><span>100%</span></div></div>
  </div>
  <div class="card"><p class="slbl">Trade extremes</p>
    ${[['Best trade','+$'+best,'#22C55E',78],['Worst trade','-$'+worst,'#EF4444',38]].map(([l,v,c,w])=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#9CA3AF;">${l}</span><span style="font-family:monospace;font-weight:500;color:${c};">${v}</span></div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${c};"></div></div></div>`).join('')}
    <div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#9CA3AF;">Max consecutive wins</span><span class="mv pos">7</span></div><div class="bar-track"><div class="bar-fill" style="width:65%;background:#22C55E;"></div></div></div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#9CA3AF;">Max consecutive losses</span><span class="mv neg">8</span></div><div class="bar-track"><div class="bar-fill" style="width:72%;background:#EF4444;"></div></div></div>
  </div>`;
}

function rWin(a){
  const d=a.data[ST.tf[a.id]];
  const wins=Math.round(d.t*d.w/100),losses=d.t-wins;
  const longs=Math.round(d.t*0.6),shorts=d.t-longs;
  return`<div class="card"><p class="slbl">Direction</p>
    <div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#3B82F6;">Long trades</span><span style="color:#3B82F6;font-family:monospace;font-weight:500;">${longs}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(longs,d.t)}%;background:#3B82F6;"></div></div></div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#F97316;">Short trades</span><span style="color:#F97316;font-family:monospace;font-weight:500;">${shorts}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(shorts,d.t)}%;background:#F97316;"></div></div></div>
  </div>
  <div class="card"><p class="slbl">Results</p>
    <div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#22C55E;">Profit trades</span><span class="mv pos">${wins}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(wins,d.t)}%;background:#22C55E;"></div></div></div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:#EF4444;">Loss trades</span><span class="mv neg">${losses}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct(losses,d.t)}%;background:#EF4444;"></div></div></div>
  </div>
  <div class="card"><p class="slbl">Long / Short by period</p>
    <div style="height:150px;position:relative;"><canvas id="d-ls"></canvas></div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:#9CA3AF;">
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#3B82F6;display:inline-block;"></span>Long</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#F97316;display:inline-block;"></span>Short</span>
    </div>
  </div>
  <div class="card"><p class="slbl">Streaks</p>
    ${[['Avg consecutive wins','2.4','pos'],['Avg consecutive losses','1.8','neg']].map(([l,v,c])=>`<div class="mrow"><span class="ml">${l}</span><span class="mv ${c}">${v}</span></div>`).join('')}
  </div>`;
}

  return`<div style="padding-bottom:16px;">
    <h2 style="font-size:17px;font-weight:500;margin-bottom:3px;">Trading history</h2>
    <p style="font-size:11px;color:#6B7280;margin-bottom:14px;">All accounts · Closed positions · Tap to expand</p>
    <div class="card" style="padding:0 14px;">
      ${TRADES.map(t=>{

            <div style="border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:8px;">

              <div style="display:flex;justify-content:space-between;"><span style="font-size:11px;color:#9CA3AF;">Δ = ${t.delta} (${t.dpct}%)</span><span style="font-size:11px;color:#6B7280;">▴ collapse</span></div>

function rAccs(){
  return`<div style="padding-bottom:16px;">
    <h2 style="font-size:17px;font-weight:500;margin-bottom:3px;">Accounts</h2>
    <p style="font-size:11px;color:#6B7280;margin-bottom:14px;">${ACCS.length} connected</p>
    ${ACCS.map(a=>{const d=a.data[ST.tf[a.id]];return`<div class="card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;"><div style="display:flex;align-items:center;gap:8px;"><span class="sdot live"></span><div><p style="font-size:14px;font-weight:500;">${a.name}</p><p style="font-size:11px;color:#6B7280;">#${a.id} · ${a.broker} · ${a.currency}</p></div></div><span style="font-size:10px;background:rgba(34,197,94,0.1);color:#22C55E;padding:3px 8px;border-radius:6px;">Active</span></div>
      <div style="display:flex;gap:20px;padding-top:10px;border-top:1px solid var(--border);">
        <div><p style="font-size:10px;color:#6B7280;">Profit</p><p class="${cP(d.p)}" style="font-size:13px;font-weight:500;font-family:monospace;">${fP(d.p)}</p></div>
        <div><p style="font-size:10px;color:#6B7280;">Equity</p><p style="font-size:13px;font-weight:500;">$${d.e.toLocaleString()}</p></div>
        <div><p style="font-size:10px;color:#6B7280;">Win %</p><p class="blue" style="font-size:13px;font-weight:500;">${d.w.toFixed(1)}%</p></div>
        <div><p style="font-size:10px;color:#6B7280;">DD</p><p class="${cD(d.dd)}" style="font-size:13px;font-weight:500;">${d.dd.toFixed(1)}%</p></div>
      </div>
    </div>`;}).join('')}
  </div>`;
}

function initCharts(){
  ACCS.forEach(a=>{
    const el=document.getElementById(`sp-${a.id}`);
    if(!el)return;
    dC(`sp-${a.id}`);
    const up=a.sp[a.sp.length-1]>=a.sp[0];
    const ctx=el.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,70);
    if(up){
      grad.addColorStop(0,'rgba(53,242,166,0.2)');
      grad.addColorStop(1,'rgba(53,242,166,0)');
    }else{
      grad.addColorStop(0,'rgba(255,107,107,0.2)');
      grad.addColorStop(1,'rgba(255,107,107,0)');
    }
    CH[`sp-${a.id}`]=new Chart(el,{type:'line',
      data:{labels:a.sp.map((_,i)=>i),datasets:[{data:a.sp,borderColor:up?'#35f2a6':'#ff6b6b',borderWidth:1.6,pointRadius:0,fill:true,backgroundColor:grad,tension:0.45}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
    });
  });
  const pe=document.getElementById('d-pie');
  if(pe){dC('d-pie');CH['d-pie']=new Chart(pe,{type:'doughnut',
    data:{labels:['XAUUSD','EURUSD','GBPUSD','USDJPY','AUDUSD'],datasets:[{data:[38,26,18,11,7],backgroundColor:['#38BDF8','#22C55E','#A78BFA','#F59E0B','#F87171'],borderWidth:0,hoverOffset:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0f141c',borderColor:'#1e2a3a',borderWidth:1,bodyColor:'#e7ecf4',titleColor:'#7c8797',bodyFont:{family:'JetBrains Mono',size:11},titleFont:{family:'JetBrains Mono',size:11}}}}
  });}
  const ee=document.getElementById('d-eq');
  if(ee&&ST.detAcc){
    const a=ACCS.find(x=>x.id===ST.detAcc);
    const d=a.data[ST.tf[a.id]];
    const n=10,base=d.bal,step=(d.e-base)/n;
    const bal=Array.from({length:n},(_,i)=>Math.round(base+step*i));
    const eq=bal.map((b,i)=>Math.round(b+(i%3===1?-b*0.016:i%3===2?b*0.011:b*0.004)));
    dC('d-eq');CH['d-eq']=new Chart(ee,{type:'line',
      data:{labels:['Sep 5','Sep 10','Sep 15','Sep 20','Sep 25','Oct 1','Oct 7','Oct 13','Oct 20','Oct 28'],datasets:[
        {label:'Equity',data:eq,borderColor:'#38BDF8',borderWidth:1.5,pointRadius:0,fill:false,tension:0.4},
        {label:'Balance',data:bal,borderColor:'#6B7280',borderWidth:1,pointRadius:0,fill:false,tension:0.3,borderDash:[4,3]}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,backgroundColor:'#0f141c',borderColor:'#1e2a3a',borderWidth:1,titleColor:'#7c8797',bodyColor:'#e7ecf4',bodyFont:{family:'JetBrains Mono',size:11},titleFont:{family:'JetBrains Mono',size:11}}},
        scales:{x:{grid:{color:'rgba(30,42,58,0.6)'},ticks:{color:'#7c8797',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:5}},y:{grid:{color:'rgba(30,42,58,0.6)'},ticks:{color:'#7c8797',font:{size:10},callback:v=>'$'+v.toLocaleString()}}}}
    });
  }
  const le=document.getElementById('d-ls');
  if(le&&ST.detAcc){
    const a=ACCS.find(x=>x.id===ST.detAcc);
    const d=a.data[ST.tf[a.id]];
    const lr=[0.58,0.62,0.55,0.60,0.61,0.59,0.60].map(r=>Math.round(d.t/7*r));
    const sr=lr.map(v=>Math.round(d.t/7)-v+1);
    dC('d-ls');CH['d-ls']=new Chart(le,{type:'bar',
      data:{labels:['Sep','Oct','Nov','Dec','Jan','Feb','Mar'],datasets:[
        {label:'Long',data:lr,backgroundColor:'#3B82F6',borderRadius:3,borderSkipped:false},
        {label:'Short',data:sr,backgroundColor:'#F97316',borderRadius:3,borderSkipped:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0f141c',borderColor:'#1e2a3a',borderWidth:1,bodyColor:'#e7ecf4',titleColor:'#7c8797',bodyFont:{family:'JetBrains Mono',size:11},titleFont:{family:'JetBrains Mono',size:11}}},
        scales:{x:{grid:{display:false},ticks:{color:'#7c8797',font:{size:10}}},y:{grid:{color:'rgba(30,42,58,0.6)'},ticks:{color:'#7c8797',font:{size:10}}}}}
    });
  }
}

</script>
