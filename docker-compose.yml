services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supachai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-9717}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supachai} -d ${POSTGRES_DB:-trading_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      target: runner
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-supachai}:${POSTGRES_PASSWORD:-9717}@db:5432/${POSTGRES_DB:-trading_db}
      SECRET_KEY: ${SECRET_KEY:-therng}
      RUN_DB_PUSH: "true"
      FTP_HOST: ${FTP_HOST:-therng.thddns.net}
      FTP_PORT: ${FTP_PORT:-21}
      FTP_USER: ${FTP_USER:-supachai}
      FTP_PASS: ${FTP_PASS:-9717}
      FTP_PATH: ${FTP_PATH:-usb1_1_1/Metatrader5}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runner
    command: node dist/worker.js
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-supachai}:${POSTGRES_PASSWORD:-9717}@db:5432/${POSTGRES_DB:-trading_db}
      RUN_DB_PUSH: "false"
      FTP_HOST: ${FTP_HOST:-therng.thddns.net}
      FTP_PORT: ${FTP_PORT:-21}
      FTP_USER: ${FTP_USER:-supachai}
      FTP_PASS: ${FTP_PASS:-9717}
      FTP_PATH: ${FTP_PATH:-usb1_1_1/Metatrader5}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-60000}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
