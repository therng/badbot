<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BadBot — Trading Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #06080D;
  --bg1: #0B0E16;
  --bg2: #10141E;
  --bg3: #171C28;
  --border: rgba(200,190,160,0.1);
  --border-hi: rgba(200,190,160,0.22);
  --gold: #C8A96E;
  --gold-dim: rgba(200,169,110,0.55);
  --gold-glow: rgba(200,169,110,0.15);
  --mint: #00D4A4;
  --mint-dim: rgba(0,212,164,0.18);
  --rose: #FF6B6B;
  --rose-dim: rgba(255,107,107,0.18);
  --ice: #7EB8F7;
  --ice-dim: rgba(126,184,247,0.15);
  --text: #E8E4DA;
  --text-2: rgba(232,228,218,0.55);
  --text-3: rgba(232,228,218,0.3);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --mono: 'Azeret Mono', 'Courier New', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg0);}
body{
  background:var(--bg0);
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:20px 16px;
  font-family:var(--serif);color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* ── App shell ── */
.app{
  width:100%;max-width:418px;
  height:min(756px,calc(100vh - 40px));
  display:flex;flex-direction:column;
  background:var(--bg1);
  border-radius:20px;
  overflow:hidden;
  border:0.5px solid var(--border-hi);
  box-shadow:0 32px 80px rgba(0,0,0,0.7),0 0 0 0.5px rgba(200,169,110,0.06);
  position:relative;
}

/* Subtle scanline texture */
.app::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );border-radius:20px;
}

.scroll{
  flex:1;overflow-y:auto;padding:16px 14px 8px;
  scrollbar-width:none;position:relative;z-index:1;
}
.scroll::-webkit-scrollbar{display:none;}

/* ── Bottom nav ── */
.bnav{
  flex-shrink:0;display:flex;
  background:var(--bg2);
  border-top:0.5px solid var(--border);
  padding:10px 0 20px;position:relative;z-index:1;
}
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;color:var(--text-3);
  font-size:9.5px;font-family:var(--mono);letter-spacing:0.06em;
  cursor:pointer;padding:6px 0;text-transform:uppercase;
  transition:color 0.2s;
}
.bni.on{color:var(--gold);}
.bni svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.4;}

/* ── Cards ── */
.card{
  background:var(--bg2);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:10px;
  transition:border-color 0.2s;
}
.card:hover{border-color:var(--border-hi);}

/* ── Header bar ── */
.dash-head{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:18px;
}
.dash-head h2{
  font-family:var(--serif);font-size:22px;font-weight:600;
  letter-spacing:-0.02em;color:var(--text);line-height:1;
}
.dash-head p{
  font-family:var(--mono);font-size:10px;color:var(--text-3);
  margin-top:4px;letter-spacing:0.04em;
}
.live-badge{
  font-family:var(--mono);font-size:9px;letter-spacing:0.1em;
  color:var(--mint);background:var(--mint-dim);
  padding:4px 9px;border-radius:4px;
  text-transform:uppercase;
}

/* ── Account card ── */
.acc-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:12px;
}
.acc-name{
  display:flex;align-items:center;gap:7px;
}
.sdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--mint);flex-shrink:0;
}
.sdot.live{animation:breathe 2.4s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.25;transform:scale(0.55);}}
.acc-name-text{
  font-family:var(--serif);font-size:16px;font-weight:500;
  letter-spacing:-0.01em;
}
.acc-sub{
  font-family:var(--mono);font-size:10px;color:var(--text-3);
  letter-spacing:0.04em;margin-top:2px;padding-left:14px;
}
.broker-tag{
  font-family:var(--mono);font-size:9px;letter-spacing:0.08em;
  color:var(--gold-dim);
  background:rgba(200,169,110,0.08);
  border:0.5px solid rgba(200,169,110,0.15);
  padding:3px 8px;border-radius:4px;
  text-transform:uppercase;
}

/* ── Sparkline area ── */
.sp-wrap{position:relative;margin-bottom:10px;}
.sp-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
.sp-balance{
  font-family:var(--mono);font-size:11px;color:var(--text-3);
  letter-spacing:0.02em;
}
.sp-growth{
  font-family:var(--mono);font-size:15px;font-weight:500;
  letter-spacing:-0.01em;
  display:flex;align-items:center;gap:5px;
}
.sp-dot{
  width:6px;height:6px;border-radius:50%;
  display:inline-block;
}
.sp-canvas{position:relative;height:56px;}
.tf-row{
  display:flex;justify-content:flex-end;gap:3px;margin-top:7px;
}
.tb{
  background:none;border:0.5px solid var(--border);
  border-radius:4px;padding:3px 8px;
  font-size:10px;font-family:var(--mono);letter-spacing:0.04em;
  color:var(--text-3);cursor:pointer;
  transition:all 0.15s;
}
.tb.on{
  border-color:var(--gold);
  background:rgba(200,169,110,0.1);
  color:var(--gold);
}
.tb:hover:not(.on){border-color:var(--border-hi);color:var(--text-2);}

/* ── KPI grid ── */
.kgrid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  padding-top:12px;
  border-top:0.5px solid var(--border);
}
.kchip{
  background:var(--bg3);border-radius:10px;
  padding:9px 7px 8px;cursor:pointer;
  border:0.5px solid transparent;
  transition:all 0.18s;
}
.kchip:hover{border-color:var(--border-hi);background:var(--bg3);}
.kl{
  font-family:var(--mono);font-size:8.5px;
  color:var(--text-3);letter-spacing:0.07em;
  text-transform:uppercase;margin-bottom:4px;
}
.kv{
  font-family:var(--mono);font-size:12.5px;font-weight:500;
  letter-spacing:-0.01em;
}
.pos{color:var(--mint);}
.neg{color:var(--rose);}
.warn{color:#F0A040;}
.gold{color:var(--gold);}
.ice{color:var(--ice);}

/* ── YTD table ── */
.ytd-section{
  padding-top:14px;margin-top:8px;
  border-top:0.5px solid var(--border);
}
.ytd-label{
  font-family:var(--mono);font-size:9px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text-3);
  margin-bottom:10px;
}
.ytd-wrap{overflow-x:auto;}
.ytd-wrap::-webkit-scrollbar{height:2px;}
.ytd-wrap::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
.ytd{border-collapse:collapse;font-size:10.5px;min-width:620px;width:100%;}
.ytd th{
  padding:3px 6px;text-align:center;
  font-family:var(--mono);font-weight:400;
  color:var(--text-3);letter-spacing:0.04em;
  font-size:10px;
}
.ytd td{
  padding:5px 6px;text-align:center;
  font-family:var(--mono);
}
.ytd .row-lbl{text-align:left;color:var(--text-2);}
.ytd .yr-col{
  position:sticky;right:0;background:var(--bg2);
  font-weight:500;
}
.ytd .th-yr{position:sticky;right:0;background:var(--bg2);}
.ytd tr:last-child td{border-top:0.5px solid var(--border);}

/* ── Detail screen ── */
.back{
  display:flex;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;
  font-family:var(--mono);font-size:11px;letter-spacing:0.06em;
  color:var(--text-3);padding:0 0 14px;
  text-transform:uppercase;
  transition:color 0.15s;
}
.back:hover{color:var(--gold);}
.back svg{width:14px;height:14px;stroke:currentColor;fill:none;}
.det-head{margin-bottom:14px;}
.det-head h2{
  font-family:var(--serif);font-size:20px;font-weight:600;
  letter-spacing:-0.02em;
}
.det-head p{
  font-family:var(--mono);font-size:10px;color:var(--text-3);
  letter-spacing:0.04em;margin-top:3px;
}

/* ── Metric rows ── */
.slbl{
  font-family:var(--mono);font-size:9px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text-3);
  margin-bottom:8px;
}
.mrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:0.5px solid var(--border);
}
.mrow:last-child{border-bottom:none;}
.ml{
  font-family:var(--serif);font-size:14px;color:var(--text-2);
}
.mv{
  font-family:var(--mono);font-size:13px;font-weight:500;
  color:var(--text);
}

/* ── Bar track ── */
.bar-track{
  height:3px;background:var(--bg0);
  border-radius:2px;overflow:hidden;margin:2px 0 10px;
}
.bar-fill{height:100%;border-radius:2px;}

/* ── Risk bar ── */
.risk-bar{
  height:6px;border-radius:3px;
  background:linear-gradient(to right,var(--mint) 0%,#F0A040 50%,var(--rose) 100%);
  position:relative;margin:4px 0;
}
.risk-dot{
  position:absolute;top:-2px;
  width:10px;height:10px;border-radius:50%;
  background:var(--text);border:2px solid var(--bg2);
  transform:translateX(-50%);
}

/* ── Trade row ── */
.tag{
  font-size:8.5px;padding:2px 6px;border-radius:3px;
  font-family:var(--mono);letter-spacing:0.06em;font-weight:500;
  text-transform:uppercase;
}
.tag-buy{background:rgba(126,184,247,0.15);color:var(--ice);}
.tag-sell{background:rgba(255,107,107,0.15);color:var(--rose);}
.trow{
  padding:11px 0;border-bottom:0.5px solid var(--border);
  cursor:pointer;
}
.trow:last-child{border-bottom:none;}

/* ── Positions ── */
.pos-card{
  padding:13px 14px;
  margin-bottom:8px;
}
.pos-symbol{font-family:var(--serif);font-size:16px;font-weight:500;}
.pos-meta{
  font-family:var(--mono);font-size:10px;color:var(--text-3);
  letter-spacing:0.03em;margin-top:2px;
}
.pos-acc{font-family:var(--mono);font-size:9.5px;color:var(--text-3);margin-top:4px;}
.pos-pnl{font-family:var(--mono);font-size:14px;font-weight:500;}

/* ── Accounts screen ── */
.acc-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:10px;
}
.acc-kpis{
  display:flex;gap:16px;
  padding-top:10px;border-top:0.5px solid var(--border);
}
.akpi p:first-child{
  font-family:var(--mono);font-size:9px;
  letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:3px;
}
.akpi p:last-child{
  font-family:var(--mono);font-size:13px;font-weight:500;
}

/* ── Chart placeholder ── */
.chart-placeholder{
  width:100%;height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--bg3) 0%,var(--bg2) 50%,var(--bg3) 100%);
  background-size:200% 100%;
  animation:shimmer 1.8s ease-in-out infinite;
}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:100% 50%}}

@media(max-width:480px){
  body{padding:0;}
  .app{max-width:none;height:100vh;border-radius:0;box-shadow:none;}
}
</style>
</head>

<script>

        '2026':{Jan:1200,Feb:-180,Mar:-180,Apr:null,May:null,Jun:null,Jul:null,Aug:null,Sep:null,Oct:null,Nov:null,Dec:null,year:840}}}

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TRADES=[

  {id:'3504510088',sym:'USDJPY',full:'USD/Yen',side:'sell',lots:'0.10',op:'149.820',cl:'149.540',delta:'-0.280',dpct:'-0.19',pl:18.7,ot:'2026.03.11 07:00',ct:'2026.03.11 10:45',sl:'150.20',tp:'149.00',swap:'–',charges:'-0.20'}
];
const OPEN_POS=[
  {acc:'Supachai',sym:'XAUUSD',side:'buy',lots:'0.50',op:'2318.40',cur:'2334.85',pl:82.25},
  {acc:'Supachai',sym:'EURUSD',side:'sell',lots:'1.00',op:'1.0892',cur:'1.0874',pl:18.0},
  {acc:'Supachai',sym:'GBPUSD',side:'buy',lots:'0.30',op:'1.2640',cur:'1.2618',pl:-6.60},
  {acc:'Bot-Pepper',sym:'USDJPY',side:'buy',lots:'0.20',op:'148.20',cur:'149.85',pl:22.21},
  {acc:'Bot-Pepper',sym:'AUDUSD',side:'sell',lots:'0.50',op:'0.6480',cur:'0.6495',pl:-7.50}
];

const ST={screen:'dashboard',tf:{},ytd:{},exp:null,detAcc:null,detType:null};
ACCS.forEach(a=>{ST.tf[a.id]='M';ST.ytd[a.id]=false;});
const CH={};

const fC=v=>v>=0?`var(--mint)`:`var(--rose)`;
const cP=v=>v>=0?'pos':'neg';
const cD=v=>v<=5?'pos':v<=15?'warn':'neg';
const fp=(v,d=0)=>{
  const s=v>=0?'+$':'-$';
  return s+Math.abs(v).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d});
};
const pct=(a,b)=>b?Math.min(100,Math.round(Math.abs(a)/b*100)):0;
function dC(id){if(CH[id]){try{CH[id].destroy();}catch(e){}delete CH[id];}}

function nav(screen,acc,type){
  ST.screen=screen;ST.detAcc=acc||null;ST.detType=type||null;
  Object.keys(CH).forEach(k=>dC(k));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  const map={dashboard:'dashboard',positions:'positions',history:'history',accounts:'accounts',detail:'dashboard'};
  const btn=document.getElementById('bni-'+(map[screen]||'dashboard'));
  if(btn)btn.classList.add('on');
  const el=document.getElementById('main-scroll');
  el.scrollTop=0;
  render();
}

function render(){
  const el=document.getElementById('main-scroll');
  const s=ST.screen;
  if(s==='dashboard')el.innerHTML=rDash();
  else if(s==='detail')el.innerHTML=rDetail();
  else if(s==='positions')el.innerHTML=rPos();
  else if(s==='history')el.innerHTML=rHist();
  else if(s==='accounts')el.innerHTML=rAccs();
  setTimeout(initCharts,80);
}

/* ── DASHBOARD ── */
function rDash(){
  return`<div style="padding-bottom:8px;">
    <div class="dash-head">
      <div>
        <h2>Trading<br><em>Monitor</em></h2>
        <p>MT5 · Last sync 2m ago</p>
      </div>
      <span class="live-badge">● live</span>
    </div>
    ${ACCS.map(rCard).join('')}
  </div>`;
}

function rCard(a){
  const d=a.data[ST.tf[a.id]];
  const up=d.g>=0;
  const gCol=up?'var(--mint)':'var(--rose)';
  const gTxt=(d.g>=0?'+':'')+d.g.toFixed(1)+'%';
  const ytdOpen=ST.ytd[a.id];
  return`<div class="card">
    <div class="acc-header">
      <div>
        <div class="acc-name">
          <span class="sdot live"></span>
          <span class="acc-name-text">${a.name}</span>
        </div>
        <div class="acc-sub">#${a.id} · ${a.currency}</div>
        <div class="acc-sub" style="margin-top:1px;color:rgba(232,228,218,0.25);">Bal $${d.bal.toLocaleString()}</div>
      </div>

/* ── CHARTS ── */
function initCharts(){
  const gridColor='rgba(200,190,160,0.05)';
  const tickColor='rgba(232,228,218,0.28)';
  const tooltipCfg={
    backgroundColor:'#10141E',
    borderColor:'rgba(200,169,110,0.2)',
    borderWidth:1,
    titleColor:'rgba(232,228,218,0.5)',
    bodyColor:'#E8E4DA',
    padding:8,
    titleFont:{family:'Azeret Mono, monospace',size:10},
    bodyFont:{family:'Azeret Mono, monospace',size:11}
  };

  ACCS.forEach(a=>{
    const el=document.getElementById(`sp-${a.id}`);
    if(!el)return;
    dC(`sp-${a.id}`);
    const d=a.data[ST.tf[a.id]];
    const up=d.g>=0;
    const color=up?'#00D4A4':'#FF6B6B';
    CH[`sp-${a.id}`]=new Chart(el,{type:'line',
      data:{labels:a.sp.map((_,i)=>i),datasets:[{data:a.sp,borderColor:color,borderWidth:1.5,pointRadius:0,fill:true,
        backgroundColor:(ctx)=>{
          const c=ctx.chart.ctx;
          if(!ctx.chart.chartArea)return'transparent';
          const g=c.createLinearGradient(0,ctx.chart.chartArea.top,0,ctx.chart.chartArea.bottom);
          g.addColorStop(0,up?'rgba(0,212,164,0.18)':'rgba(255,107,107,0.18)');
          g.addColorStop(1,'rgba(0,0,0,0)');
          return g;
        },tension:0.45}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{x:{display:false},y:{display:false}}}
    });
  });

  const pieEl=document.getElementById('d-pie');
  if(pieEl){
    dC('d-pie');
    CH['d-pie']=new Chart(pieEl,{type:'doughnut',
      data:{labels:['XAUUSD','EURUSD','GBPUSD','USDJPY','AUDUSD'],
        datasets:[{data:[38,26,18,11,7],backgroundColor:['#C8A96E','#00D4A4','#7EB8F7','#FF6B6B','#A78BFA'],borderWidth:0,hoverOffset:4,borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
        plugins:{legend:{display:false},tooltip:{...tooltipCfg}}}
    });
  }

  const eqEl=document.getElementById('d-eq');
  if(eqEl&&ST.detAcc){
    const a=ACCS.find(x=>x.id===ST.detAcc);
    const d=a.data[ST.tf[a.id]];
    const n=10,base=d.bal,step=(d.e-base)/n;
    const bal=Array.from({length:n},(_,i)=>Math.round(base+step*i));
    const eq=bal.map((b,i)=>Math.round(b+(i%3===1?-b*0.016:i%3===2?b*0.011:b*0.004)));
    const lbls=['Sep 5','Sep 10','Sep 15','Sep 20','Sep 25','Oct 1','Oct 7','Oct 13','Oct 20','Oct 28'];
    dC('d-eq');
    CH['d-eq']=new Chart(eqEl,{type:'line',
      data:{labels:lbls,datasets:[
        {label:'Equity',data:eq,borderColor:'#C8A96E',borderWidth:1.5,pointRadius:0,fill:true,
         backgroundColor:(ctx)=>{const c=ctx.chart.ctx;if(!ctx.chart.chartArea)return'transparent';const g=c.createLinearGradient(0,ctx.chart.chartArea.top,0,ctx.chart.chartArea.bottom);g.addColorStop(0,'rgba(200,169,110,0.18)');g.addColorStop(1,'rgba(0,0,0,0)');return g;},tension:0.4,fill:true},
        {label:'Balance',data:bal,borderColor:'rgba(232,228,218,0.25)',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false,tension:0.3}
      ]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
        plugins:{legend:{display:false},tooltip:{...tooltipCfg,mode:'index',intersect:false}},
        scales:{
          x:{grid:{color:gridColor},ticks:{color:tickColor,font:{family:'Azeret Mono',size:9},maxRotation:0,autoSkip:true,maxTicksLimit:4}},
          y:{grid:{color:gridColor},ticks:{color:tickColor,font:{family:'Azeret Mono',size:9},callback:v=>'$'+Number(v).toLocaleString()}}
        }}
    });
  }

  const lsEl=document.getElementById('d-ls');
  if(lsEl&&ST.detAcc){
    const a=ACCS.find(x=>x.id===ST.detAcc);
    const d=a.data[ST.tf[a.id]];
    const lr=[0.58,0.62,0.55,0.60,0.61,0.59,0.60].map(r=>Math.round(d.t/7*r));
    const sr=lr.map(v=>Math.round(d.t/7)-v+1);
    dC('d-ls');
    CH['d-ls']=new Chart(lsEl,{type:'bar',
      data:{labels:['Sep','Oct','Nov','Dec','Jan','Feb','Mar'],datasets:[
        {label:'Long',data:lr,backgroundColor:'rgba(126,184,247,0.55)',borderRadius:3,borderSkipped:false},
        {label:'Short',data:sr,backgroundColor:'rgba(255,107,107,0.45)',borderRadius:3,borderSkipped:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
        plugins:{legend:{display:false},tooltip:{...tooltipCfg}},
        scales:{
          x:{grid:{display:false},ticks:{color:tickColor,font:{family:'Azeret Mono',size:9}}},
          y:{grid:{color:gridColor},ticks:{color:tickColor,font:{family:'Azeret Mono',size:9}}}
        }}
    });
  }
}

render();
</script>
</body>
</html>
